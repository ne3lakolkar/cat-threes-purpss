<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nits' Hand-Controlled Purp System</title>
    <link href="https://fonts.googleapis.com/css2?family=Aptos:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background-color: #05000a; font-family: 'Aptos', sans-serif; }
        canvas { display: block; }
        #video-container {
            position: absolute;
            bottom: 10px;
            left: 10px;
            width: 160px;
            height: 120px;
            border: 2px solid #7e22ce; /* Purple border */
            z-index: 10;
            opacity: 0.7;
            transform: scaleX(-1); 
        }
        video { width: 100%; height: 100%; object-fit: cover; }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #d8b4fe;
            pointer-events: none;
            z-index: 10;
            text-shadow: 0 0 5px #d8b4fe;
        }
        h1 { font-size: 1.5rem; margin: 0; }
        p { font-size: 0.9rem; margin-top: 5px; opacity: 0.8; }
        .instruction { color: white; background: rgba(0,0,0,0.5); padding: 5px; border-radius: 4px; margin-top: 5px; display: inline-block;}
    </style>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

    <div id="ui">
        <h1>Nits' ✋🏻-controlled ✨Star💫 System</h1>
        <div class="instruction">🖐 Move Hand: Rotate/Position</div><br>
        <div class="instruction">👌 Pinch (Thumb+Index): Change Shape</div><br>
        <div class="instruction">✊ Fist: Collapse | ✋ Open: Expand</div>
        <p id="status">Loading Purps AI Model...</p>
    </div>

    <div id="video-container">
        <video class="input_video"></video>
    </div>

<script>
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x05000a, 0.002);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 30;

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const PARTICLE_COUNT = 12000;
    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(PARTICLE_COUNT * 3);
    const colors = new Float32Array(PARTICLE_COUNT * 3);
    const targetPositions = new Float32Array(PARTICLE_COUNT * 3); 

    for (let i = 0; i < PARTICLE_COUNT * 3; i++) {
        positions[i] = (Math.random() - 0.5) * 100;
        colors[i] = 1.0;
        targetPositions[i] = positions[i];
    }

    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

    const getSprite = () => {
        const canvas = document.createElement('canvas');
        canvas.width = 32; canvas.height = 32;
        const context = canvas.getContext('2d');
        const gradient = context.createRadialGradient(16, 16, 0, 16, 16, 16);
        gradient.addColorStop(0, 'rgba(216, 180, 254, 1)'); // Purple core
        gradient.addColorStop(0.2, 'rgba(168, 85, 247, 0.8)');
        gradient.addColorStop(0.5, 'rgba(88, 28, 135, 0.2)');
        gradient.addColorStop(1, 'rgba(0,0,0,0)');
        context.fillStyle = gradient;
        context.fillRect(0, 0, 32, 32);
        const texture = new THREE.Texture(canvas);
        texture.needsUpdate = true;
        return texture;
    };

    const material = new THREE.PointsMaterial({
        size: 0.6,
        vertexColors: true,
        map: getSprite(),
        blending: THREE.AdditiveBlending,
        depthWrite: false,
        transparent: true
    });

    const particles = new THREE.Points(geometry, material);
    scene.add(particles);

    const shapes = ['sphere', 'heart', 'saturn', 'flower', 'torus', 'cat'];
    let currentShapeIndex = 0;

    function getPointOnSphere(i) {
        const phi = Math.acos(-1 + (2 * i) / PARTICLE_COUNT);
        const theta = Math.sqrt(PARTICLE_COUNT * Math.PI) * phi;
        const r = 10;
        return {
            x: r * Math.cos(theta) * Math.sin(phi),
            y: r * Math.sin(theta) * Math.sin(phi),
            z: r * Math.cos(phi),
            r: 0.6, g: 0.3, b: 1.0 // Purple-Blue
        };
    }

    function getPointOnHeart(i) {
        const t = (i / PARTICLE_COUNT) * Math.PI * 2;
        const x = 16 * Math.pow(Math.sin(t), 3);
        const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
        const z = (Math.random() - 0.5) * 4; 
        const scale = 0.6;
        return {
            x: x * scale, y: y * scale, z: z,
            r: 0.9, g: 0.1, b: 1.0 // Vivid Magenta-Purple
        };
    }

    function getPointOnSaturn(i) {
        const ratio = 0.7;
        const isPlanet = i < PARTICLE_COUNT * ratio;
        if (isPlanet) {
            const idx = i;
            const phi = Math.acos(-1 + (2 * idx) / (PARTICLE_COUNT*ratio));
            const theta = Math.sqrt((PARTICLE_COUNT*ratio) * Math.PI) * phi;
            const r = 6;
            return {
                x: r * Math.cos(theta) * Math.sin(phi),
                y: r * Math.sin(theta) * Math.sin(phi),
                z: r * Math.cos(phi),
                r: 0.7, g: 0.4, b: 1.0 // Soft Purple
            };
        } else {
            const idx = i - PARTICLE_COUNT * ratio;
            const angle = (idx / (PARTICLE_COUNT * (1-ratio))) * Math.PI * 2 * 5;
            const radius = 9 + Math.random() * 4;
            return {
                x: radius * Math.cos(angle),
                y: (Math.random()-0.5),
                z: radius * Math.sin(angle),
                r: 0.5, g: 0.2, b: 0.8 // Darker Purple
            };
        }
    }

    function getPointOnFlower(i) {
        const theta = (i / PARTICLE_COUNT) * Math.PI * 100;
        const k = 4;
        const r = 12 * Math.cos(k * theta);
        return {
            x: r * Math.cos(theta), y: r * Math.sin(theta), z: (Math.random() - 0.5) * 5,
            r: 0.8, g: 0.2, b: 1.0 // Purple
        };
    }

    function getPointOnTorus(i) {
        const u = Math.random() * Math.PI * 2;
        const v = Math.random() * Math.PI * 2;
        const R = 8, r = 3;
        return {
            x: (R + r * Math.cos(v)) * Math.cos(u),
            y: (R + r * Math.cos(v)) * Math.sin(u),
            z: r * Math.sin(v),
            r: 0.4, g: 0.0, b: 0.7 // Deep Indigo
        };
    }

    function getPointOnCat(i) {
    const ratio = i / PARTICLE_COUNT;
    let x, y, z;

    if (ratio < 0.6) { // Body (Cylinder)
        const a = Math.random() * Math.PI * 2;
        const r = 4 + Math.random() * 2; // Fluff thickness
        x = (ratio * 20) - 10;
        y = Math.cos(a) * r - 2;
        z = Math.sin(a) * r;
    } else if (ratio < 0.8) { // Head (Sphere)
        const phi = Math.acos(-1 + (Math.random() * 2));
        const theta = Math.random() * Math.PI * 2;
        const r = 4;
        x = r * Math.sin(phi) * Math.cos(theta) + 12;
        y = r * Math.sin(phi) * Math.sin(theta) + 2;
        z = r * Math.cos(phi);
    } else { // Tail (Wavy line)
        const t = (ratio - 0.8) * 40;
        x = -12 - t;
        y = Math.sin(t * 0.5) * 2 - 2;
        z = Math.cos(t * 0.5) * 2;
    }

    return {
        x: x, y: y, z: z,
        r: 0.9, g: 0.7, b: 1.0 // Light Lavender-Purple
    };
}

    function setTargetShape(shapeName) {
    const colorAttr = particles.geometry.attributes.color;
    for (let i = 0; i < PARTICLE_COUNT; i++) {
        let p;
        if(shapeName === 'sphere') p = getPointOnSphere(i);
        else if(shapeName === 'heart') p = getPointOnHeart(i);
        else if(shapeName === 'saturn') p = getPointOnSaturn(i);
        else if(shapeName === 'flower') p = getPointOnFlower(i);
        else if(shapeName === 'torus') p = getPointOnTorus(i);
        else if(shapeName === 'cat') p = getPointOnCat(i);

        targetPositions[i * 3] = p.x;
        targetPositions[i * 3 + 1] = p.y;
        targetPositions[i * 3 + 2] = p.z;
        colorAttr.setXYZ(i, p.r, p.g, p.b);
    }
    colorAttr.needsUpdate = true;
}

    setTargetShape(shapes[0]);

    const videoElement = document.getElementsByClassName('input_video')[0];
    const statusText = document.getElementById('status');
    let handX = 0, handY = 0, isPinching = false, isFist = false, lastPinchTime = 0;
    
    function onResults(results) {
        statusText.innerText = "Purps Engine Active";
        statusText.style.color = "#d8b4fe";

        if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
            const landmarks = results.multiHandLandmarks[0];
            handX = (0.5 - landmarks[8].x) * 2; 
            handY = (0.5 - landmarks[8].y) * 2;

            const dist = Math.hypot(landmarks[8].x-landmarks[4].x, landmarks[8].y-landmarks[4].y, landmarks[8].z-landmarks[4].z);
            if (dist < 0.05) {
                if (!isPinching && Date.now() - lastPinchTime > 500) {
                    currentShapeIndex = (currentShapeIndex + 1) % shapes.length;
                    setTargetShape(shapes[currentShapeIndex]);
                    lastPinchTime = Date.now();
                }
                isPinching = true;
            } else { isPinching = false; }

            const dFist = Math.hypot(landmarks[8].x - landmarks[0].x, landmarks[8].y - landmarks[0].y);
            isFist = (dFist < 0.3);
        }
    }

    const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
    hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
    hands.onResults(onResults);

    const cameraUtils = new Camera(videoElement, {
        onFrame: async () => { await hands.send({image: videoElement}); },
        width: 320, height: 240
    });
    cameraUtils.start();

    const clock = new THREE.Clock();
    function animate() {
        requestAnimationFrame(animate);
        const time = clock.getElapsedTime();
        const posAttr = particles.geometry.attributes.position;
        const curPos = posAttr.array;

        particles.rotation.x += ((handY * 1) - particles.rotation.x) * 0.1;
        particles.rotation.y += ((handX * 1) - particles.rotation.y) * 0.1;

        let exp = isFist ? 0.1 : (isPinching ? 1.2 : 1.5);

        for (let i = 0; i < PARTICLE_COUNT; i++) {
            const idx = i * 3;
            const tx = targetPositions[idx] * exp;
            const ty = targetPositions[idx+1] * exp;
            const tz = targetPositions[idx+2] * exp;
            const noise = Math.sin(time + i) * 0.05;
            const speed = isFist ? 0.2 : 0.05;

            curPos[idx] += (tx - curPos[idx]) * speed + noise;
            curPos[idx+1] += (ty - curPos[idx+1]) * speed + noise;
            curPos[idx+2] += (tz - curPos[idx+2]) * speed + noise;
        }
        posAttr.needsUpdate = true;
        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
</script>
</body>
</html>
