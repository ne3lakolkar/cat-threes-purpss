<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Sunshine Girl Protocol | For Hina</title>
    <style>
        body { margin: 0; background: #111; overflow: hidden; font-family: 'Aptos', sans-serif; cursor: none; }
        #canvas-wrapper { position: relative; width: 100vw; height: 100vh; }
        canvas { position: absolute; top: 0; left: 0; }
        
        #ui {
            position: absolute; bottom: 40px; width: 100%; text-align: center;
            color: #fff; z-index: 10; letter-spacing: 5px; font-weight: 200;
            text-transform: uppercase; pointer-events: none; opacity: 0.6;
        }
        #msg {
            position: absolute; top: 38%; left: 50%; transform: translate(-50%, -50%);
            color: #fff; font-size: 1.5rem; text-align: center; font-weight: 700;
            transition: opacity 1.5s, transform 1s; opacity: 0; z-index: 5;
            text-shadow: 0 0 15px #ffca28; letter-spacing: 2px;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
</head>
<body>

    <div id="canvas-wrapper">
        <div id="ui">A focus is all it takes to bring the clear sky.</div>
        <div id="msg">Happy Women's Day<br>to the girl who brings the sun.</div>
        <video class="input_video" style="display:none;"></video>
    </div>

<script>
    let sunPower = 0; // 0 = Heavy rain, 1 = Clear sun
    let smoothSun = 0;
    let focusValue = 0;
    let img;
    let rain = [];

    // --- Face Tracking Logic ---
    const videoElement = document.getElementsByClassName('input_video')[0];
    const faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
    
    faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true });
    faceMesh.onResults(results => {
        if (results.multiFaceLandmarks && results.multiFaceLandmarks[0]) {
            const landmarks = results.multiFaceLandmarks[0];
            
            // 1. Zoom Tracking (Distance)
            const dFace = Math.hypot(landmarks[1].x - landmarks[152].x, landmarks[1].y - landmarks[152].y);
            
            // 2. Center Gaze Tracking
            const nose = landmarks[1];
            const dx = Math.abs(nose.x - 0.5);
            const dy = Math.abs(nose.y - 0.5);
            
            // Combined Focus Value
            focusValue = lerp(focusValue, dFace * (1 - (dx + dy) * 1.5), 0.1);
            
            // Trigger threshold
            sunPower = (focusValue > 0.4) ? 1 : 0;
        }
    });

    const camera = new Camera(videoElement, {
        onFrame: async () => { await faceMesh.send({image: videoElement}); },
        width: 640, height: 480
    });
    camera.start();

    // --- Visuals with p5.js ---
    function preload() {
        // !!! YOU NEED TO HOST image_0.png AND REFERENCE IT HERE !!!
        img = loadImage('/imageWWY'); 
    }

    function setup() {
        createCanvas(windowWidth, windowHeight);
        noStroke();
        
        // Initialize Rain
        for (let i = 0; i < 300; i++) {
            rain[i] = {
                x: random(width), y: random(height),
                len: random(10, 20), speed: random(5, 10)
            };
        }
    }

    function draw() {
        clear();
        
        // Smooth transition
        smoothSun = lerp(smoothSun, sunPower, 0.03);
        
        // 1. Draw the Background Image (with dynamic brightness)
        push();
        tint(255, 100 + smoothSun * 155); // Dims to 100, brightens to 255
        image(img, 0, 0, width, height);
        pop();
        
        // 2. Draw the Rain (dissipates as sun power rises)
        push();
        stroke(200, 200, 255, (1 - smoothSun) * 100); // Fades away
        strokeWeight(1);
        for (let i = 0; i < rain.length; i++) {
            line(rain[i].x, rain[i].y, rain[i].x, rain[i].y + rain[i].len);
            rain[i].y += rain[i].speed;
            if (rain[i].y > height) rain[i].y = -rain[i].len;
        }
        pop();

        // 3. Secret Message Logic
        if (smoothSun > 0.9) {
            document.getElementById('msg').style.opacity = 1;
            document.getElementById('msg').style.transform = 'translate(-50%, -50%) scale(1.1)';
        } else {
            document.getElementById('msg').style.opacity = 0;
            document.getElementById('msg').style.transform = 'translate(-50%, -50%) scale(1)';
        }
    }

    function windowResized() { resizeCanvas(windowWidth, windowHeight); }
</script>
</body>
</html>
