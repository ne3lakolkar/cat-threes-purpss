<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lilac Cosmos - Hand Controlled</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #020108; font-family: sans-serif; }
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #020108; color: #d1b3ff; display: flex; justify-content: center; align-items: center; z-index: 100; font-size: 1.5rem; }
        .ui { position: absolute; top: 20px; left: 20px; color: #d1b3ff; pointer-events: none; z-index: 10; }
        #webcam { transform: scaleX(-1); position: absolute; bottom: 10px; right: 10px; width: 150px; border-radius: 10px; opacity: 0.5; border: 1px solid #4b0082; }
    </style>
</head>
<body>
    <div id="loading">✨ Creating your Lilac Cosmos...</div>
    <div class="ui"><h1>Lilac Cosmos</h1><p>Move your hand to rotate the scene.</p></div>
    <video id="webcam" autoplay playsinline></video>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.132.2';

        // --- 1. Scene Setup ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const worldGroup = new THREE.Group();
        scene.add(worldGroup);

        // --- 2. Create Elements ---
        function createLilac() {
            const count = 10000;
            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(count * 3);
            for(let i=0; i<count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const r = Math.random() * (0.5 + (i/count));
                pos.set([Math.cos(angle)*r, (i/count)*4 - 2, Math.sin(angle)*r], i*3);
            }
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            return new THREE.Points(geo, new THREE.PointsMaterial({ color: 0x9370DB, size: 0.02, transparent: true, blending: THREE.AdditiveBlending }));
        }

        function createClouds() {
            const count = 1500;
            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(count * 3);
            for(let i=0; i<count; i++) {
                pos.set([(Math.random()-0.5)*10, 2 + (Math.random()-0.5)*2, (Math.random()-0.5)*5], i*3);
            }
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            return new THREE.Points(geo, new THREE.PointsMaterial({ color: 0x4B0082, size: 0.12, transparent: true, opacity: 0.4 }));
        }

        function createStars() {
            const count = 5000;
            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(count * 3);
            for(let i=0; i<count; i++) {
                pos.set([(Math.random()-0.5)*30, (Math.random()-0.5)*30, (Math.random()-0.5)*30], i*3);
            }
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            return new THREE.Points(geo, new THREE.PointsMaterial({ color: 0xFFD700, size: 0.015 }));
        }

        const lilac = createLilac();
        const clouds = createClouds();
        const stars = createStars();
        worldGroup.add(lilac, clouds);
        scene.add(stars); 

        camera.position.z = 7;

        // --- 3. Hand Tracking (Using global window objects) ---
        let targetX = 0, targetY = 0;
        const videoElement = document.getElementById('webcam');
