<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith Eye-Control System</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #020005; font-family: sans-serif; }
        #ui {
            position: absolute; top: 30px; left: 30px; color: #f0abfc;
            z-index: 10; text-shadow: 0 0 10px #a855f7; pointer-events: none;
        }
        .instr { font-size: 0.8rem; color: white; opacity: 0.7; margin-bottom: 5px; }
        #video-container {
            position: absolute; bottom: 20px; right: 20px;
            width: 120px; height: 90px; border-radius: 12px;
            overflow: hidden; border: 1px solid #a855f7; opacity: 0.4;
            transform: scaleX(-1);
        }
        video { width: 100%; height: 100%; object-fit: cover; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
</head>
<body>

    <div id="ui">
        <h1 style="margin:0; font-weight: 300; letter-spacing: 2px;">ZENITH <span>✨</span></h1>
        <p style="margin:5px 0 15px 0; font-size: 0.9rem;">Mind-Sync Visualization</p>
        <div class="instr">◦ Tilt Head: Rotate Universe</div>
        <div class="instr">◦ Lean In/Out: Control Pulse</div>
        <div class="instr">◦ Open Mouth: Evolve Shape</div>
    </div>

    <div id="video-container"><video class="input_video"></video></div>

<script>
    // --- THREE.JS SETUP ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({antialias: true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const PARTICLE_COUNT = 8000;
    const geometry = new THREE.BufferGeometry();
    const posArray = new Float32Array(PARTICLE_COUNT * 3);
    const targetArray = new Float32Array(PARTICLE_COUNT * 3);

    for(let i=0; i<PARTICLE_COUNT*3; i++) {
        posArray[i] = (Math.random()-0.5) * 50;
        targetArray[i] = posArray[i];
    }
    geometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));

    const material = new THREE.PointsMaterial({
        size: 0.15, color: 0xd8b4fe, transparent: true, opacity: 0.8,
        blending: THREE.AdditiveBlending
    });

    const starSystem = new THREE.Points(geometry, material);
    scene.add(starSystem);
    camera.position.z = 25;

    // --- SHAPE LOGIC ---
    let currentShape = 'sphere';
    function makeSphere() {
        for(let i=0; i<PARTICLE_COUNT; i++) {
            const phi = Math.acos(-1 + (2 * i) / PARTICLE_COUNT);
            const theta = Math.sqrt(PARTICLE_COUNT * Math.PI) * phi;
            targetArray[i*3] = 10 * Math.cos(theta) * Math.sin(phi);
            targetArray[i*3+1] = 10 * Math.sin(theta) * Math.sin(phi);
            targetArray[i*3+2] = 10 * Math.cos(phi);
        }
    }
    makeSphere();

    // --- FACE TRACKING ---
    const videoElement = document.querySelector('.input_video');
    let headRotX = 0, headRotY = 0, zoomFactor = 1, mouthOpen = false;

    const faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
    faceMesh.setOptions({maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5});
    
    faceMesh.onResults((results) => {
        if (results.multiFaceLandmarks && results.multiFaceLandmarks[0]) {
            const landmarks = results.multiFaceLandmarks[0];
            
            // 1. Rotation Tracking (Nose bridge to chin)
            headRotY = (landmarks[1].x - 0.5) * 2; // Left/Right
            headRotX = (landmarks[1].y - 0.5) * 2; // Up/Down

            // 2. Zoom Tracking (Distance between eyes)
            const eyeDist = Math.hypot(landmarks[33].x - landmarks[263].x, landmarks[33].y - landmarks[263].y);
            zoomFactor = THREE.MathUtils.lerp(zoomFactor, eyeDist * 8, 0.1); 

            // 3. Mouth Interaction (Trigger Shape Change)
            const mouthDist = Math.hypot(landmarks[13].x - landmarks[14].x, landmarks[13].y - landmarks[14].y);
            if (mouthDist > 0.05 && !mouthOpen) {
                material.color.setHex(Math.random() * 0xffffff);
                mouthOpen = true;
            } else if (mouthDist < 0.03) { mouthOpen = false; }
        }
    });

    const cam = new Camera(videoElement, {
        onFrame: async () => { await faceMesh.send({image: videoElement}); },
        width: 640, height: 480
    });
    cam.start();

    // --- ANIMATION LOOP ---
    function animate() {
        requestAnimationFrame(animate);
        
        // Smooth rotation based on head position
        starSystem.rotation.y += (headRotY - starSystem.rotation.y) * 0.05;
        starSystem.rotation.x += (headRotX - starSystem.rotation.x) * 0.05;

        const positions = geometry.attributes.position.array;
        for(let i=0; i<PARTICLE_COUNT; i++) {
            const i3 = i * 3;
            // Particles "Bloom" out as you lean in
            const dynamicScale = zoomFactor;
            positions[i3] += (targetArray[i3] * dynamicScale - positions[i3]) * 0.05;
            positions[i3+1] += (targetArray[i3+1] * dynamicScale - positions[i3+1]) * 0.05;
            positions[i3+2] += (targetArray[i3+2] * dynamicScale - positions[i3+2]) * 0.05;
        }
        
        geometry.attributes.position.needsUpdate = true;
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
