<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lilac Cosmos | Hand Controlled</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #010105; font-family: sans-serif; }
        #loading { position: fixed; inset: 0; background: #010105; color: #b19cd9; display: flex; 
                   justify-content: center; align-items: center; z-index: 100; font-size: 1.2rem; }
        .ui { position: absolute; top: 20px; left: 20px; color: #b19cd9; z-index: 10; pointer-events: none; }
        #webcam { transform: scaleX(-1); position: absolute; bottom: 10px; right: 10px; width: 140px; 
                  border-radius: 8px; opacity: 0.3; border: 1px solid #4b0082; }
    </style>
</head>
<body>
    <div id="loading">✨ Igniting the Cosmos...</div>
    <div class="ui"><h1>Lilac Cosmos</h1><p>Move your hand to rotate the scene.</p></div>
    <video id="webcam" autoplay playsinline></video>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.132.2';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const worldGroup = new THREE.Group();
        scene.add(worldGroup);

        // --- FIXED PARTICLE GENERATION ---
        function createParticles(count, color, size, type) {
            const geo = new THREE.BufferGeometry();
            const positions = new Float32Array(count * 3);
            
            for(let i = 0; i < count; i++) {
                let x, y, z;
                if(type === 'lilac') {
                    const angle = Math.random() * Math.PI * 2;
                    const r = Math.random() * (0.4 + (i/count) * 0.8);
                    x = Math.cos(angle) * r;
                    y = (i / count) * 5 - 2.5; 
                    z = Math.sin(angle) * r;
                } else if(type === 'sphere') {
                    const r = size * Math.cbrt(Math.random());
                    const theta = Math.random() * 2 * Math.PI;
                    const phi = Math.acos(2 * Math.random() - 1);
                    x = r * Math.sin(phi) * Math.cos(theta);
                    y = r * Math.sin(phi) * Math.sin(theta);
                    z = r * Math.cos(phi);
                }
                // Fixed the .set() logic that was causing your RangeError
                positions[i * 3] = x;
                positions[i * 3 + 1] = y;
                positions[i * 3 + 2] = z;
            }
            
            geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            return new THREE.Points(geo, new THREE.PointsMaterial({ 
                color, size: 0.025, transparent: true, blending: THREE.AdditiveBlending, opacity: 0.7 
            }));
        }

        const lilac = createParticles(10000, 0x9370DB, 0, 'lilac');
        const clouds = createParticles(2000, 0x4B0082, 6, 'sphere');
        const stars = createParticles(4000, 0xFFD700, 25, 'sphere');
        
        worldGroup.add(lilac, clouds);
        scene.add(stars); 

        camera.position.z = 8;

        // --- HAND TRACKING (Zeeshan-Style Interaction) ---
        let targetX = 0, targetY = 0;
        const videoElement = document.getElementById('webcam');

        const hands = new window.Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5 });
        hands.onResults((results) => {
            document.getElementById('loading').style.display = 'none';
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                // Tracking Landmark 8 (Index Tip) for rotation control
                const tip = results.multiHandLandmarks[0][8];
                targetY = (tip.x - 0.5) * 4;
                targetX = (tip.y - 0.5) * 4;
            }
        });

        const mpCamera = new window.Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 640, height: 480
        });
        mpCamera.start();

        function animate() {
            requestAnimationFrame(animate);
            // Smooth Rotation Interpolation (Lerp)
            worldGroup.rotation.y += (targetY - worldGroup.rotation.y) * 0.05;
            worldGroup.rotation.x += (targetX - worldGroup.rotation.x) * 0.05;
            stars.rotation.y += 0.0002;
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
